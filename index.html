<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sample Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            margin: 30px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Webpage</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="https://www.google.com" target="_blank">Google</a>
        <a href="https://www.github.com" target="_blank">GitHub</a>
    </nav>
</header>

<div class="container">
    <h2 id="home">Home Section</h2>
    <p>This is a simple webpage with links and buttons.</p>

    <button onclick="showMessage()">Click Me</button>
    <button onclick="goToAbout()">Go to About</button>
</div>

<div class="container">
    <h2 id="about">About Section</h2>
    <p>This section provides information about the page.</p>

    <button onclick="window.open('https://www.google.com', '_blank')">
        Visit Google
    </button>
</div>

<footer>
    <p>© 2026 My Webpage</p>
</footer>

<script>
    function showMessage() {
        alert("Hello! You clicked the button.");
    }

    function goToAbout() {
        document.getElementById("about").scrollIntoView({ behavior: "smooth" });
    }
</script>

</body>
</html>
